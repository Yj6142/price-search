<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단가 검색 | CEREATIZIT KOREA</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --text: #e8eaf6;
    --muted: #7c82a8;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; }

  header {
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px; position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 960px; margin: 0 auto; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .logo h1 { font-size: 20px; font-weight: 700; }
  .logo span { font-size: 13px; color: var(--muted); font-weight: 400; }

  .search-wrap { position: relative; }
  .search-input {
    width: 100%; padding: 12px 48px 12px 44px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
  .clear-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: var(--border); border: none; color: var(--muted); cursor: pointer;
    padding: 4px 8px; border-radius: 6px; font-size: 12px; display: none;
  }
  .clear-btn.visible { display: block; }

  .filter-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .data-status { font-size: 12px; color: var(--muted); margin-left: auto; }
  .data-status.ready { color: var(--success); }

  main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

  #results-header { display: none; justify-content: space-between; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
  #results-header.visible { display: flex; }

  /* ── 카드 ── */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
    transition: all 0.15s; position: relative; overflow: hidden;
  }
  .result-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.15s;
  }
  .result-card:hover { border-color: var(--accent); background: var(--surface2); }
  .result-card:hover::before { opacity: 1; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .article-no {
    font-family: 'Courier New', monospace; font-size: 15px; color: var(--accent);
    background: rgba(79,142,247,0.1); padding: 4px 10px; border-radius: 5px; white-space: nowrap;
  }
  .sales-text { font-size: 14px; color: var(--muted); text-align: right; }
  .material-desc { font-size: 17px; font-weight: 600; margin-bottom: 14px; line-height: 1.4; }

  /* ── 단가 비교 그리드 ── */
  .price-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .price-section {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
    position: relative;
  }

  .price-section-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .price-section.new-price .price-section-label { color: var(--accent); }
  .price-section.old-price .price-section-label { color: var(--muted); }

  .price-row-item {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .price-row-item:last-child { margin-bottom: 0; }

  .price-item-label {
    font-size: 13px; color: var(--muted);
  }

  .price-item-value {
    font-size: 20px; font-weight: 700;
  }
  .price-item-value.no-price { font-size: 14px; color: var(--muted); font-weight: 400; }
  .price-item-value.up { color: var(--success); }
  .price-item-value.down { color: var(--danger); }
  .price-item-value.same { color: var(--muted); }
  .price-item-value.new-only { color: var(--warning); }

  /* 변동 뱃지 */
  .change-badge {
    display: inline-block;
    font-size: 12px; font-weight: 700; padding: 3px 8px;
    border-radius: 4px; margin-top: 6px;
  }
  .change-badge.up { background: rgba(34,197,94,0.15); color: var(--success); }
  .change-badge.down { background: rgba(239,68,68,0.15); color: var(--danger); }
  .change-badge.same { background: rgba(124,130,168,0.15); color: var(--muted); }

  /* 조회불가 */
  .no-data-badge {
    font-size: 11px; color: var(--muted);
    background: rgba(124,130,168,0.1);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px;
    text-align: center;
  }

  /* 복사 버튼 */
  .copy-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-top: 12px;
  }
  .copy-btn {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 8px 12px; border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); background: rgba(34,197,94,0.08); }

  .center-msg { text-align: center; padding: 60px 20px; color: var(--muted); }
  .center-msg .icon { font-size: 36px; margin-bottom: 12px; }
  .center-msg p { font-size: 14px; }

  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  mark { background: rgba(79,142,247,0.25); color: var(--accent); border-radius: 3px; padding: 0 2px; }

  #pagination { display: flex; justify-content: center; gap: 8px; padding: 20px 0 8px; flex-wrap: wrap; }
  .page-btn {
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--text); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  @media (max-width: 540px) {
    header { padding: 14px 16px 12px; }
    .search-input { font-size: 16px; }
    .price-grid { grid-template-columns: 1fr; }
    .data-status { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🔍</div>
      <div><h1>단가 검색 <span>CEREATIZIT KOREA</span></h1></div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input type="text" id="search-input" class="search-input"
             placeholder="Article No. 또는 Material Description 입력..."
             autocomplete="off" autocorrect="off" spellcheck="false" disabled>
      <button class="clear-btn" id="clear-btn">✕ 지우기</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="article">Article No.</button>
      <button class="filter-btn" data-filter="material">Material Desc.</button>
      <span class="data-status" id="data-status">데이터 로딩 중...</span>
    </div>
  </div>
</header>

<main>
  <div id="results-header"><span id="results-count"></span></div>
  <div id="results-container">
    <div class="center-msg"><div class="spinner"></div><p>단가 데이터를 불러오는 중...</p></div>
  </div>
  <div id="pagination"></div>
</main>

<script>
  let allData = [], filtered = [], currentPage = 1, searchMode = 'all';
  let debounceTimer;
  const PAGE_SIZE = 50;

  fetch('data.json')
    .then(r => r.json())
    .then(data => {
      allData = data;
      document.getElementById('data-status').textContent = `✓ ${data.length.toLocaleString()}개 로드됨`;
      document.getElementById('data-status').classList.add('ready');
      document.getElementById('search-input').disabled = false;
      document.getElementById('results-container').innerHTML =
        `<div class="center-msg"><div class="icon">🔎</div><p>Article No. 또는 Material Description을 입력하세요</p></div>`;
      document.getElementById('search-input').focus();
    })
    .catch(() => {
      document.getElementById('results-container').innerHTML =
        `<div class="center-msg"><div class="icon">⚠️</div><p>data.json 파일을 불러올 수 없습니다.</p></div>`;
    });

  document.getElementById('search-input').addEventListener('input', e => {
    const q = e.target.value.trim();
    document.getElementById('clear-btn').classList.toggle('visible', q.length > 0);
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => doSearch(q), 150);
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    document.getElementById('clear-btn').classList.remove('visible');
    filtered = []; currentPage = 1; renderResults([], '');
    document.getElementById('search-input').focus();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      searchMode = btn.dataset.filter;
      const q = document.getElementById('search-input').value.trim();
      if (q) doSearch(q);
    });
  });

  function doSearch(q) {
    if (!q) { filtered = []; currentPage = 1; renderResults([], ''); return; }
    const lower = q.toLowerCase();
    filtered = allData.filter(row => {
      if (searchMode === 'article') return row.a.toLowerCase().includes(lower);
      if (searchMode === 'material') return row.m.toLowerCase().includes(lower);
      return row.a.toLowerCase().includes(lower) || row.m.toLowerCase().includes(lower) || row.s.toLowerCase().includes(lower);
    });
    currentPage = 1;
    renderResults(filtered, q);
  }

  function hl(text, q) {
    if (!q || !text) return text || '';
    const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
  }

  function fmt(val) {
    if (val === null || val === undefined) return null;
    return Math.round(val).toLocaleString('ko-KR');
  }

  function priceClass(newVal, oldVal) {
    if (newVal === null || oldVal === null) return 'new-only';
    if (newVal > oldVal) return 'up';
    if (newVal < oldVal) return 'down';
    return 'same';
  }

  function changeBadge(newVal, oldVal) {
    if (newVal === null || oldVal === null) return '';
    const diff = Math.round(newVal - oldVal);
    const pct = oldVal !== 0 ? ((newVal - oldVal) / oldVal * 100).toFixed(1) : 0;
    if (diff === 0) return `<span class="change-badge same">변동없음</span>`;
    const sign = diff > 0 ? '+' : '';
    const cls = diff > 0 ? 'up' : 'down';
    return `<span class="change-badge ${cls}">${sign}${diff.toLocaleString('ko-KR')} (${sign}${pct}%)</span>`;
  }

  function cardHTML(row, q) {
    const nd = fmt(row.d);
    const od = fmt(row.od);
    const hasOld = row.od !== null;
    const dcls = priceClass(row.d, row.od);

    const copyNew = `${row.a}\n${row.s}\n${row.m}\n@${nd || '단가없음'}`;
    const copyOld = `${row.a}\n${row.s}\n${row.m}\n@${od || '단가없음'}`;
    const escNew = copyNew.replace(/`/g,'\\`').replace(/\$/g,'\\$');
    const escOld = copyOld.replace(/`/g,'\\`').replace(/\$/g,'\\$');

    return `<div class="result-card">
      <div class="card-top">
        <span class="article-no">${hl(row.a, q)}</span>
        ${row.s ? `<span class="sales-text">${hl(row.s, q)}</span>` : ''}
      </div>
      <div class="material-desc">${hl(row.m, q)}</div>

      <div class="price-grid">
        <!-- 신단가 대리점가 -->
        <div class="price-section new-price">
          <div class="price-section-label">🆕 신단가 (2026.06)</div>
          <div class="price-item-label">대리점가</div>
          <div class="price-item-value ${nd ? dcls : 'no-price'}" style="margin-top:4px">
            ${nd ? '₩' + nd : '—'}
          </div>
          ${nd && hasOld ? changeBadge(row.d, row.od) : ''}
        </div>

        <!-- 구단가 A Class -->
        <div class="price-section old-price">
          <div class="price-section-label">📁 구단가 (2026.04)</div>
          ${hasOld ? `
          <div class="price-item-label">A Class</div>
          <div class="price-item-value" style="color:var(--muted); margin-top:4px">${od ? '₩' + od : '—'}</div>
          ` : `<div class="no-data-badge" style="margin-top:8px">구단가 조회 불가<br><span style="font-size:11px">해당 Article No. 없음</span></div>`}
        </div>
      </div>

      <div class="copy-row">
        <button class="copy-btn" onclick="copyInfo(this, \`${escNew}\`, '📋 신단가 복사')">📋 신단가 복사</button>
        <button class="copy-btn" onclick="copyInfo(this, \`${escOld}\`, '📋 구단가 복사')">📋 구단가 복사</button>
      </div>
    </div>`;
  }

  function copyInfo(btn, text, label) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ 복사됨';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = label; btn.classList.remove('copied'); }, 2000);
    });
  }

  function renderResults(data, q) {
    const container = document.getElementById('results-container');
    const header = document.getElementById('results-header');
    const pagination = document.getElementById('pagination');

    if (!q || data.length === 0) {
      header.classList.remove('visible'); pagination.innerHTML = '';
      container.innerHTML = q
        ? `<div class="center-msg"><div class="icon">😶</div><p><strong>"${q}"</strong>에 해당하는 항목이 없습니다</p></div>`
        : `<div class="center-msg"><div class="icon">🔎</div><p>Article No. 또는 Material Description을 입력하세요</p></div>`;
      return;
    }

    header.classList.add('visible');
    document.getElementById('results-count').textContent = `검색 결과 ${data.length.toLocaleString()}개`;
    const totalPages = Math.ceil(data.length / PAGE_SIZE);
    const start = (currentPage - 1) * PAGE_SIZE;
    container.innerHTML = data.slice(start, start + PAGE_SIZE).map(row => cardHTML(row, q)).join('');
    renderPagination(totalPages, q);
  }

  function renderPagination(totalPages, q) {
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="changePage(${currentPage-1},'${q}')" ${currentPage===1?'disabled':''}>‹ 이전</button>`;
    const range = [];
    for (let i = Math.max(1,currentPage-2); i <= Math.min(totalPages,currentPage+2); i++) range.push(i);
    if (range[0] > 1) html += `<button class="page-btn" onclick="changePage(1,'${q}')">1</button>${range[0]>2?'<span style="color:var(--muted);padding:0 4px">…</span>':''}`;
    range.forEach(i => { html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i},'${q}')">${i}</button>`; });
    if (range[range.length-1] < totalPages) html += `${range[range.length-1]<totalPages-1?'<span style="color:var(--muted);padding:0 4px">…</span>':''}<button class="page-btn" onclick="changePage(${totalPages},'${q}')">${totalPages}</button>`;
    html += `<button class="page-btn" onclick="changePage(${currentPage+1},'${q}')" ${currentPage===totalPages?'disabled':''}>다음 ›</button>`;
    pg.innerHTML = html;
  }

  function changePage(p, q) {
    if (p < 1 || p > Math.ceil(filtered.length / PAGE_SIZE)) return;
    currentPage = p;
    renderResults(filtered, q);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
